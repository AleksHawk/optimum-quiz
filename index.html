<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimum Knowledge Challenge</title>
    
    <!-- Favicon (виправлено розтягування) -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <!-- Open Graph Tags for X (Twitter) Preview -->
    <meta property="og:title" content="Optimum Knowledge Challenge">
    <meta property="og:description" content="Prove your knowledge of RLNC, mump2p, DeRAM, and the technology raising the ceiling for blockchain data movement.">
    <meta property="og:image" content="https://alekshawk.github.io/optimum-quiz/mascot-hero.png">
    <meta property="og:url" content="https://alekshawk.github.io/optimum-quiz/">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(15, 15, 20, 0.4);
            --surface-border: rgba(255, 255, 255, 0.08);
            
            --text-main: #ffffff;
            --text-muted: #8e8e99;
            
            --accent-purple: #b87cff;
            --accent-blue: #51b1fe;
            --accent-green: #64e27f;
            --accent-orange: #fea158;
            --accent-red: #ff4d4d;
            
            --font-main: "Inter", system-ui, -apple-system, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, button, a, input { cursor: none !important; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Background Layer */
        .bg-gradient {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -4;
            background: linear-gradient(-45deg, #0a0a0c, #130a24, #081222, #07170c);
            background-size: 400% 400%;
            animation: gradientFlow 20s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -3;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .bg-noise {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2;
            opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Cursor */
        #cursor-dot {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background-color: var(--text-main); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            transition: background-color 0.2s, transform 0.1s;
        }

        #cursor-ring {
            position: fixed; top: 0; left: 0; width: 36px; height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
            will-change: transform;
        }

        body.hovering #cursor-dot { background-color: var(--accent-purple); transform: translate(-50%, -50%) scale(0.5); }
        body.hovering #cursor-ring { width: 50px; height: 50px; background-color: rgba(184, 124, 255, 0.1); border-color: transparent; }

        header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 2rem; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .logo-container img { height: 28px; width: auto; display: block; opacity: 0.9; object-fit: contain; }

        /* TABS */
        .nav-tabs {
            display: flex; gap: 2rem;
        }
        .nav-tab {
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: var(--transition-smooth); cursor: none;
            padding: 0.5rem 1rem; border-radius: 8px;
        }
        .nav-tab.active {
            color: var(--text-main); background: rgba(255,255,255,0.05);
        }
        .nav-tab.disabled {
            opacity: 0.5; pointer-events: none; cursor: default; letter-spacing: 0.2em; position: relative;
        }
        .nav-tab.disabled::after {
            content: "SOON"; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.12em;
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            color: var(--accent-purple); opacity: 0.9;
        }

        .social-links { display: flex; align-items: center; gap: 1.5rem; }
        .social-links a, .sound-toggle { color: var(--text-muted); transition: var(--transition-smooth); background: none; border: none; }
        .social-links a:hover, .sound-toggle:hover { color: var(--text-main); transform: translateY(-2px); }
        .social-links svg, .sound-toggle svg { width: 20px; height: 20px; fill: currentColor; }

        main { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 6rem 2rem 2rem 2rem; position: relative; }

        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--surface-border);
            border-radius: 16px; 
            padding: 3.5rem; width: 100%; max-width: 800px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative; z-index: 10;
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            border-radius: 16px 16px 0 0;
        }

        .view { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .view.active { display: block; opacity: 1; transform: translateY(0); animation: viewEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes viewEnter { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .text-gradient {
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        h1 { font-size: 4rem; line-height: 1; margin-bottom: 1.5rem; font-weight: 800; letter-spacing: -0.04em; }
        p.subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 600px; font-weight: 400; }

        .intro-content { display: flex; justify-content: flex-start; align-items: center; gap: 2rem; position: relative; }
        .intro-text { flex: 1; max-width: 480px; position: relative; z-index: 2; }
        
        /* Маскот — ЗБІЛЬШЕНИЙ (як на твоїй картинці) */
        .mascot-hero { 
            position: absolute;
            right: -410px;
            top: 50%;
            transform: translateY(-50%);
            width: 720px;
            height: auto; 
            object-fit: contain; 
            flex-shrink: 0;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7)) drop-shadow(0 0 60px rgba(184,124,255,0.2));
        }

        .ranks-container { display: flex; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .rank-badge {
            display: flex; align-items: center; gap: 0.8rem;
            background: rgba(255,255,255,0.03); padding: 0.6rem 1rem;
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
        }
        .rank-score { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 0.2rem 0.5rem; border-radius: 4px; }
        .rank-name { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .rank-master { border-color: rgba(184, 124, 255, 0.3); background: rgba(184, 124, 255, 0.05); }
        .rank-master .rank-name { color: var(--accent-purple); }

        .btn-primary {
            background: var(--text-main); color: var(--bg-color);
            border: none; padding: 1rem 3rem; border-radius: 100px;
            font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            transition: var(--transition-smooth); position: relative; overflow: hidden;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); background: #f0f0f0; }

        /* ... (весь інший CSS без змін) ... */

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .intro-content { flex-direction: column-reverse; text-align: center; }
            .ranks-container { justify-content: center; }
            .intro-text { max-width: 100%; }
            .mascot-hero { position: static; transform: none; right: auto; top: auto; width: 280px; max-width: 75vw; margin: 0 auto; z-index: 1;}
            .glass-card { padding: 2rem 1.5rem; border-radius: 0; border-left: none; border-right: none; }
            header { padding: 1.5rem; flex-wrap: wrap; }
            .nav-tabs { width: 100%; order: 3; justify-content: center; margin-top: 1rem; }
            main { padding: 8rem 0 0 0; align-items: flex-start; }
            .action-buttons { flex-direction: column; width: 100%; }
            .action-buttons a, .action-buttons button { width: 100%; justify-content: center; }
            .creator-badge { bottom: 16px; right: 50%; transform: translateX(50%); width: max-content; }
            body, button, a, input { cursor: auto !important; }
            #cursor-dot, #cursor-ring { display: none; }
        }
    </style>
</head>
<body>
    <!-- ... (весь body без змін до <script>) ... -->

    <script>
        // ... (весь скрипт до функції generateCertificate) ...

        const generateCertificate = async () => {
            try {
                const canvas = document.createElement('canvas'); 
                canvas.width = 1200; 
                canvas.height = 630;
                const ctx = canvas.getContext('2d');

                // Bg + grid (без змін)
                ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const g1 = ctx.createRadialGradient(200, 100, 0, 200, 100, 800); 
                g1.addColorStop(0, 'rgba(184, 124, 255, 0.25)'); 
                g1.addColorStop(1, 'transparent');
                const g2 = ctx.createRadialGradient(1000, 500, 0, 1000, 500, 800); 
                g2.addColorStop(0, 'rgba(81, 177, 254, 0.25)'); 
                g2.addColorStop(1, 'transparent');
                ctx.fillStyle = g1; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = g2; ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                for(let i=0; i<1200; i+=40) 
                    for(let j=0; j<630; j+=40) { 
                        ctx.beginPath(); 
                        ctx.arc(i, j, 1, 0, Math.PI*2); 
                        ctx.fill(); 
                    }

                ctx.roundRect = function(x, y, w, h, r) { 
                    this.beginPath(); 
                    this.moveTo(x+r, y); 
                    this.arcTo(x+w, y, x+w, y+h, r); 
                    this.arcTo(x+w, y+h, x, y+h, r); 
                    this.arcTo(x, y+h, x, y, r); 
                    this.arcTo(x, y, x+w, y, r); 
                    this.closePath(); 
                    return this; 
                };

                const loadImage = (src) => new Promise((resolve, reject) => { 
                    const img = new Image(); 
                    img.crossOrigin="anonymous"; 
                    img.onload = () => resolve(img); 
                    img.onerror = reject; 
                    img.src = src; 
                });

                // Лого зліва вгорі
                try {
                    const logoImg = await loadImage('./optimum-logo-white.webp');
                    const lh = 50; 
                    const lw = lh * (logoImg.width / logoImg.height);
                    ctx.drawImage(logoImg, 60, 52, lw, lh);
                } catch(e) {
                    ctx.textAlign='left'; 
                    ctx.textBaseline='middle';
                    ctx.font = 'bold 36px sans-serif'; 
                    ctx.fillStyle = '#fff'; 
                    ctx.fillText('optimum', 60, 77);
                }

                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle';

                // Маскот — ЗСУНУТИЙ ЩЕ ПРАВІШЕ
                try {
                    const mascotSrc = STATE.correctCount === 10 ? './mascot-win.png' : './mascot-cert.png';
                    const mascotImg = await loadImage(mascotSrc);
                    const mh = 600; 
                    const mw = mh * (mascotImg.width / mascotImg.height);
                    const my = (canvas.height - mh) / 2 + 15;
                    const mx = canvas.width - mw + 140;   // ← ЗСУНУТО ПРАВІШЕ
                    ctx.drawImage(mascotImg, mx, my, mw, mh);
                } catch(e) { console.log("Mascot skip", e); }

                // Табличка — ТЕПЕР ВІДЦЕНТРОВАНА
                const cardW = 560, cardH = 320;
                const cardX = (canvas.width - cardW) / 2;   // ← відцентровано
                const cardY = 150;
                
                ctx.fillStyle = 'rgba(15, 15, 20, 0.85)';
                ctx.roundRect(cardX, cardY, cardW, cardH, 28); 
                ctx.fill();
                ctx.lineWidth = 2; 
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; 
                ctx.stroke();

                const topG = ctx.createLinearGradient(cardX, 0, cardX+cardW, 0);
                topG.addColorStop(0,'rgba(184,124,255,0)'); 
                topG.addColorStop(.5,'rgba(184,124,255,0.8)'); 
                topG.addColorStop(1,'rgba(81,177,254,0)');
                ctx.fillStyle = topG; 
                ctx.fillRect(cardX+40, cardY, cardW-80, 2);

                const cardCx = cardX + cardW/2;

                // Решта сертифікату (без змін)
                ctx.font = '600 22px monospace'; 
                ctx.fillStyle = '#8e8e99';
                ctx.fillText('OPTIMUM KNOWLEDGE QUIZ', cardCx, cardY + 65);

                const gradText = ctx.createLinearGradient(cardX+120, 0, cardX+cardW-120, 0);
                gradText.addColorStop(0, '#b87cff'); 
                gradText.addColorStop(0.5, '#51b1fe'); 
                gradText.addColorStop(1, '#64e27f');
                ctx.font = '300 120px monospace'; 
                ctx.fillStyle = gradText;
                ctx.fillText(`${STATE.correctCount}/10`, cardCx, cardY + 160);

                let rankName = document.getElementById('res-rank-text').innerText;
                let rankStr = `RANK: ${rankName.toUpperCase()}`;
                let rankSize = 36;
                ctx.font = `bold ${rankSize}px sans-serif`;
                while(ctx.measureText(rankStr).width > cardW - 60 && rankSize > 20){
                    rankSize -= 2; 
                    ctx.font = `bold ${rankSize}px sans-serif`;
                }
                ctx.fillStyle = '#ffffff';
                ctx.fillText(rankStr, cardCx, cardY + 250);

                // Built by Hawk — по центру внизу одним рядком
                const bottomY = canvas.height - 40;
                const bottomX = canvas.width / 2;
                
                try {
                    const pfpImg = await loadImage('./PFP.jpg');
                    ctx.save(); 
                    ctx.beginPath(); 
                    ctx.arc(bottomX - 65, bottomY, 15, 0, Math.PI*2); 
                    ctx.clip();
                    ctx.drawImage(pfpImg, bottomX - 80, bottomY - 15, 30, 30); 
                    ctx.restore();
                } catch(e) {}
                
                ctx.textAlign='left';
                ctx.font = '400 16px sans-serif'; 
                ctx.fillStyle = '#8e8e99'; 
                ctx.fillText('Built by ', bottomX - 40, bottomY);
                
                const builtByWidth = ctx.measureText('Built by ').width;
                ctx.font = 'bold 18px sans-serif'; 
                ctx.fillStyle = '#ffffff'; 
                ctx.fillText('Hawk', bottomX - 40 + builtByWidth, bottomY);
                
                ctx.textAlign='center';

                const link = document.createElement('a'); 
                link.download = `Optimum_Quiz_Rank.png`; 
                link.href = canvas.toDataURL('image/png'); 
                link.click();
            } catch (e) { 
                alert("Failed to generate image."); 
            }
        };

        // ... (решта скрипту без змін) ...
    </script>
</body>
</html>
